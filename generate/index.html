<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Generate QR Absensi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- QR Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

  <style>
  /* ── RESET ── */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ── DESIGN SYSTEM (SAMA DENGAN SCAN PAGE) ── */
  :root {
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --primary-dark: #3730a3;
    --accent: #06b6d4;
    --success: #10b981;
    --error: #ef4444;
    --bg: #0f0e17;
    --card-bg: #1a1929;
    --card-border: rgba(255,255,255,0.07);
    --text: #f0eff7;
    --text-muted: #a09fc0;
    --radius: 20px;
  }

  /* ── BODY ── */
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  /* Radial Glow Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,70,229,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,0.15) 0%, transparent 60%);
    z-index: 0;
    pointer-events: none;
  }

  /* ── CONTAINER (GANTI STYLE LAMA) ── */
  .container {
    position: relative;
    z-index: 1;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 36px 32px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow:
      0 32px 64px rgba(0,0,0,0.4),
      0 0 0 1px rgba(255,255,255,0.04) inset;
    backdrop-filter: blur(20px);
  }

  /* ── TITLE ── */
  h2 {
    color: var(--text);
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* ── BUTTON (SAMA DENGAN SCAN PAGE) ── */
  button {
    width: 100%;
    padding: 15px 20px;
    border-radius: 12px;
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.25s ease;
    background: linear-gradient(135deg, var(--primary) 0%, #6d28d9 100%);
    color: white;
    box-shadow: 0 8px 24px rgba(79,70,229,0.35);
    margin-bottom: 25px;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(79,70,229,0.5);
  }

  /* ── QR BOX ── */
  #qrcode {
    margin: 0 auto 25px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    border: 1px solid rgba(79,70,229,0.3);
    min-height: 240px;
    box-shadow: 0 0 32px rgba(79,70,229,0.15);
  }

  /* ── INFO BOX ── */
  .info-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 18px;
    text-align: left;
  }

  #info {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.8;
  }

  #info b {
    color: var(--primary-light);
  }

  /* ── TIMER ── */
  #timer {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    padding: 12px;
    background: rgba(6,182,212,0.08);
    border-radius: 10px;
    border: 1px solid rgba(6,182,212,0.2);
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* ── LOADING SPINNER ── */
  .loading-spinner {
    display: none;
    text-align: center;
    margin: 20px 0;
  }

  .loading-spinner.active {
    display: block;
  }

  .spinner {
    border: 4px solid rgba(255,255,255,0.08);
    border-top: 4px solid var(--primary-light);
    border-radius: 50%;
    width: 48px;
    height: 48px;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 13px;
    color: var(--primary-light);
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .container {
      padding: 28px 20px;
    }
  }
  </style>
</head>
<body>
  <div class="container">
    <h2>QR Absensi</h2>
    <p class="subtitle">Generate QR Code untuk sistem absensi</p>

    <button onclick="generateQR()">📱 Generate QR Code</button>

    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner"></div>
      <div class="loading-text">Generating</div>
    </div>

    <div id="qrcode"></div>

    <div class="info-box">
      <div id="info"></div>
      <div id="timer"></div>
    </div>
  </div>

<script>
const BASE_API = "https://script.google.com/macros/s/AKfycbwtaOPeaNCevIXk1SaP2KlhFrsUFAc0fyn_vPwiqUVEiJSzF_9nn56zH_hKEYjzaweG/exec";

let countdownInterval = null;

function generateQR() {
  document.getElementById("qrcode").innerHTML = "";
  document.getElementById("info").innerHTML = "";
  document.getElementById("timer").innerHTML = "";
  document.getElementById("loadingSpinner").classList.add("active");

  // stop timer lama kalau ada
  if (countdownInterval) clearInterval(countdownInterval);

  fetch(`${BASE_API}?action=generate`)
    .then(res => res.json())
    .then(res => {
      if (!res.ok) {
        alert("Gagal generate QR");
        return;
      }

      const { checkin_url, expires_at, qr_token } = res.data;

      // Hide loading spinner
      document.getElementById("loadingSpinner").classList.remove("active");

      // Generate QR
      new QRCode(document.getElementById("qrcode"), {
        text: checkin_url,
        width: 220,
        height: 220
      });

      document.getElementById("info").innerHTML = `
        <b>Token:</b> ${qr_token}<br>
        <b>Berlaku sampai:</b> ${new Date(expires_at).toLocaleTimeString()}
      `;

      startCountdown(expires_at);
    })
    .catch(err => {
      console.error(err);
      document.getElementById("loadingSpinner").classList.remove("active");
      alert("Error koneksi ke server");
    });
}

function startCountdown(expiresAt) {
  const endTime = new Date(expiresAt).getTime();

  countdownInterval = setInterval(() => {
    const now = Date.now();
    const diff = endTime - now;

    if (diff <= 0) {
      clearInterval(countdownInterval);
      document.getElementById("timer").innerHTML = "⛔ QR EXPIRED";
      document.getElementById("qrcode").innerHTML = "";
      return;
    }

    const minutes = Math.floor(diff / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    document.getElementById("timer").innerHTML =
      `⏳ Sisa waktu: ${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
  }, 1000);
}
</script>

</body>
</html>
